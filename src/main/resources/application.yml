spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/secdaily?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway가 스키마 관리 → JPA는 검증만
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Spring Boot 4 내장 resilience 활성화
  retry:
    enabled: true

# 외부 API 설정 (실제 값은 환경변수로)
anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-haiku-4-5
  max-tokens: 1500

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL}

# 스케줄 설정
schedule:
  collect:
    cron: "0 0 * * * *"            # 매시간 수집
  digest:
    cron: "0 0 8 * * *"            # 매일 오전 8시 생성·발송
  timezone: Asia/Seoul

# RSS 소스별 설정
rss:
  user-agent: "Mozilla/5.0 (compatible; SecDailyBot/1.0)"
  timeout-seconds: 10